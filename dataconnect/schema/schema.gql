type Fam @table {
  # id: UUID! @default(expr: "uuidV4()")
  name: String! @index
  email: String! @unique
  userId: String @index
}

type UserDevice @table {
  # id: UUID! @default(expr: "uuidV4()")
  token: String! @unique # The FCM registration token
  platform: String! # e.g. "android", "ios", "web"
  updatedAt: Date! @default(expr: "request.time")
  userId: String! @index
}

type Account @table {
  # id: UUID! @default(expr: "uuidV4()")
  user: Fam! @index
  network: String! @index
  networkUsername: String!
  networkUserId: String
  securityToken: String
}

type Tribe @table {
  # id: UUID! @default(expr: "uuidV4()")
  name: String @index
  description: String! @index
}

type TribeFam @table(key: ["tribe", "fam"]) {
  tribe: Tribe! @index
  fam: Fam! @index
}

type Meetup @table {
  # id: UUID! @default(expr: "uuidV4()")
  host: Fam! @index
  tribe: Tribe! @index
  title: String @index
  details: String @index
  note: String
}

type Availability @table {
  # id: UUID! @default(expr: "uuidV4()")
  fam: Fam! @index
  meetup: Meetup! @index
  date: Date! @index
  location: String! @index
  note: String
}